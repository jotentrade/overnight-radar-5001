
<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111827"><meta name="description" content="隔日沖分點買超與潛在強勢股偵測工具"><link rel="manifest" href="/manifest.webmanifest"><link rel="icon" href="/icon.svg"><link rel="stylesheet" href="/styles.css"><title>隔日沖雷達</title><style>.online-button{background:#9a6700;border-color:#9a6700}.online-button:hover{background:#7a5200}</style></head>
<body><header class="topbar"><a class="brand" href="/"><span class="brand-mark">R</span><span>隔日沖雷達</span></a><div class="market-state"><span class="pulse"></span><span id="dataState">等待資料</span></div><button class="icon-button" id="installButton" hidden title="安裝 APP" aria-label="安裝 APP"><svg><use href="#download"/></svg></button></header>
<main><section class="summary-band"><div><p class="eyebrow">TWSE MOMENTUM SCANNER</p><h1>今日訊號總覽</h1><p class="subtext">以證交所公開量價與三大法人籌碼尋找潛在強勢股</p></div><div class="summary-metrics"><div><span>符合標的</span><strong id="signalCount">0</strong></div><div><span>最高分數</span><strong id="topScore">--</strong></div><div><span>量價候選</span><strong id="rowCount">0</strong></div></div></section>
<section class="workspace"><aside class="controls"><div class="section-heading"><div><p class="eyebrow">FILTERS</p><h2>偵測條件</h2></div><button id="resetButton" class="text-button">重設</button></div>
<div class="field-group"><label for="tradeDate">交易日期</label><div class="inline-field"><input type="date" id="tradeDate"><button class="icon-button bordered" id="fetchButton" title="查詢證交所行情"><svg><use href="#refresh"/></svg></button></div><small>可用證交所行情補齊收盤價與成交量</small></div>
<div class="range-field"><div><label for="ratio">最低法人買超比重</label><output id="ratioValue">3.0%</output></div><input type="range" id="ratio" min="0.5" max="15" step="0.5" value="3"></div><div class="range-field"><div><label for="change">最低漲幅</label><output id="changeValue">7.0%</output></div><input type="range" id="change" min="0" max="10" step="0.5" value="7"></div><div class="range-field"><div><label for="volumeChange">最低成交量增幅</label><output id="volumeChangeValue">20%</output></div><input type="range" id="volumeChange" min="-50" max="200" step="10" value="20"></div><button class="primary-button online-button" id="onlineScanButton"><svg><use href="#refresh"/></svg><span>抓取證交所資料</span></button></aside>
<section class="results"><div class="section-heading result-heading"><div><p class="eyebrow">SIGNALS</p><h2>潛在強勢股</h2></div><div class="result-actions"><button class="secondary-button compact" id="backtestButton" disabled><span>隔日驗證</span></button><button class="secondary-button compact" id="exportButton" disabled><svg><use href="#download"/></svg><span>匯出 CSV</span></button></div></div><div class="empty-state" id="emptyState"><div class="radar"><span></span></div><h3>尚未執行偵測</h3><p>選擇日期與條件，直接抓取證交所公開資料。</p></div><div class="table-wrap" id="tableWrap" hidden><table><thead><tr><th>排名</th><th>股票</th><th>漲幅</th><th>量增幅</th><th>法人買超比</th><th>法人淨買超</th><th>訊號來源</th><th>分數</th></tr></thead><tbody id="resultsBody"></tbody></table></div><section class="backtest-panel" id="backtestPanel" hidden><div class="backtest-summary" id="backtestSummary"></div><div class="table-wrap"><table><thead><tr><th>股票</th><th>訊號日收盤</th><th>隔日開盤</th><th>隔日最高</th><th>隔日收盤</th><th>隔日報酬</th><th>盤中漲停</th><th>收盤漲停</th></tr></thead><tbody id="backtestBody"></tbody></table></div></section></section></section></main><div class="toast" id="toast" role="status"></div>
<svg class="symbols"><symbol id="upload" viewBox="0 0 24 24"><path d="M12 16V4m0 0L7 9m5-5 5 5M5 15v4h14v-4"/></symbol><symbol id="download" viewBox="0 0 24 24"><path d="M12 4v12m0 0 5-5m-5 5-5-5M5 20h14"/></symbol><symbol id="database" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v7c0 1.7 3.6 3 8 3s8-1.3 8-3V5M4 12v7c0 1.7 3.6 3 8 3s8-1.3 8-3v-7"/></symbol><symbol id="refresh" viewBox="0 0 24 24"><path d="M20 7v5h-5M4 17v-5h5M6.1 8a7 7 0 0 1 11.6-1L20 12M4 12l2.3 5a7 7 0 0 0 11.6-1"/></symbol><symbol id="scan" viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 1 8 8M4 12h8l4-4M4 8v4h4"/></symbol></svg><script src="/app.js" defer></script></body></html>
